# Render Blueprint – https://render.com/docs/blueprint-spec
# Deploy this repo to Render by linking it to your GitHub repo,
# or manually via the Render dashboard.

services:
  - type: web
    name: raga-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: FRONTEND_URL
        value: https://raga-identifier-eight.vercel.app/   # ← Update after Vercel deploy
